name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check --no-input PyYAML==6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install --yes lua5.1

      - name: Check Lua syntax
        run: find lua -type f -name '*.lua' -print0 | xargs -0 luac5.1 -p

      - name: Run automated tests
        run: python -m unittest discover -s tests -v

      - name: Build deterministic mod package
        run: python tools/package_mod.py

      - name: Validate mod package
        run: python tools/validate_package.py

      - name: Upload validated package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soturine-chaos-randomizer-${{ github.sha }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

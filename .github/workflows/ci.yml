name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install --yes lua5.1

      - name: Check Lua syntax
        run: find lua -type f -name '*.lua' -print0 | xargs -0 luac5.1 -p

      - name: Run automated tests
        run: python -m unittest discover -s tests -v

      - name: Build deterministic mod package
        run: python tools/package_mod.py

      - name: Validate mod package
        run: python tools/validate_package.py

      - name: Upload validated package
        uses: actions/upload-artifact@v4
        with:
          name: soturine-chaos-randomizer-${{ github.sha }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

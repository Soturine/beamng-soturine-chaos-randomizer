name: Beta readiness (no release)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Validate ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check --no-input PyYAML==6.0.3

      - name: Install Lua 5.1 on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes lua5.1

      - name: Run full automated suite on Ubuntu
        if: runner.os == 'Linux'
        run: python -m unittest discover -s tests -v

      - name: Run portable static and package suites on Windows
        if: runner.os == 'Windows'
        run: python -m unittest tests.test_static tests.test_package -v

      - name: Check JavaScript syntax
        run: node --check ui/modules/apps/soturineChaosRandomizer/app.js

      - name: Build and validate package
        run: |
          python tools/package_mod.py
          python tools/validate_package.py

      - name: Upload operating-system artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: beta-readiness-${{ matrix.label }}-${{ github.sha }}
          path: |
            dist/*.zip
            dist/*.sha256
            dist/release-manifest.json
          if-no-files-found: error
          retention-days: 14

  compare:
    name: Compare Windows and Ubuntu package bytes
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download Ubuntu artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: beta-readiness-ubuntu-${{ github.sha }}
          path: artifacts/ubuntu

      - name: Download Windows artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: beta-readiness-windows-${{ github.sha }}
          path: artifacts/windows

      - name: Require byte-identical package outputs
        shell: bash
        run: |
          cmp artifacts/ubuntu/*.zip artifacts/windows/*.zip
          cmp artifacts/ubuntu/*.sha256 artifacts/windows/*.sha256
          cmp artifacts/ubuntu/release-manifest.json artifacts/windows/release-manifest.json
